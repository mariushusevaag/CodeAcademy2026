name: Run tests 123
on:
  pull_request:
    paths:
      - 1-DevOps/idempotweet/**
  workflow_call:
jobs:
  ci:
    runs-on: ${{ vars.RUNNER || 'self-hosted' }}
    defaults:
      run:
        working-directory: 1-DevOps/idempotweet
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
        #   cache: "yarn"
      - name: Enable Corepack
        run: corepack enable
        working-directory: .
      - name: Install dependencies
        run: yarn install --immutable
      - name: Run tests
        run: yarn test
      - name: Test coverage
        run: yarn test:coverage
        continue-on-error: true
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: 1-DevOps/idempotweet
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_NEW }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
